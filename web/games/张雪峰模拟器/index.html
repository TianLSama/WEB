<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>张雪峰模拟器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
    background: #000;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    font-family: "Microsoft YaHei","微软雅黑",sans-serif;
    user-select: none;
    touch-action: manipulation;
}
#game-container {
    position: fixed;
    inset: 0;
}
canvas {
    display: block;
    position: absolute;
    top: 0; left: 0;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: none;
}
/* 触屏按钮（全客户端可见） */
#touch-controls {
    position: fixed;
    bottom: 10px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 12px;
    z-index: 10;
    pointer-events: none;
}
#touch-controls button {
    pointer-events: auto;
    width: 50px; height: 50px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.35);
    background: rgba(0,0,0,0.45);
    color: rgba(255,255,255,0.85);
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    user-select: none;
    transition: background 0.1s;
}
#touch-controls button:active {
    background: rgba(255,255,255,0.25);
}
#btn-rest {
    font-size: 12px;
    font-weight: bold;
}
</style>
</head>
<body>
<div id="game-container">
    <canvas id="game"></canvas>
</div>
<div id="touch-controls">
    <button id="btn-enter" title="进入">开始</button>
    <button id="btn-duck"  title="低头">▼</button>
    <button id="btn-jump" title="跳跃">▲</button>
    <button id="btn-rest" title="休息">休息</button>
</div>
<script>
// ============================================================
//  张雪峰模拟器 — 2D像素风跑酷小游戏
// ============================================================

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// ---- 画布尺寸 ----
const W = 800;
const H = 300;
canvas.width = W;
canvas.height = H;

// ---- 全屏缩放（拉伸填充，无黑边）----
function resizeCanvas() {
    canvas.style.width  = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ---- 字体辅助（统一微软雅黑）----
function fontCN(size, bold) {
    return (bold ? 'bold ' : '') + size + 'px "Microsoft YaHei","微软雅黑",sans-serif';
}

// ---- 常量配置 ----
const GROUND_Y = 240;          // 地面线 Y
const PLAYER_X = 220;         // 玩家 X
const GRAVITY = 0.7;
const JUMP_FORCE = -12.5;
const BASE_SPEED = 4.5;
const MAX_SPEED = 11;
const SPEED_INC = 0.0008;

const DANGER_MAX = 100;
const DANGER_ON_HIT = 15;
const DANGER_DECAY = 0.04;        // 每帧衰减（不碰道具时）
const DANGER_REST_DECAY = 0.12;   // 休息时每帧衰减
const DANGER_WARN = 70;           // 红色闪烁阈值

const REST_DURATION = 5000;       // 休息 5 秒
const REST_COOLDOWN = 120000;     // 冷却 120 秒

const OBSTACLE_MIN_GAP = 500;
const OBSTACLE_MAX_GAP = 1400;

// ---- 像素精灵生成工具 ----
function makeSprite(w, h, drawFn) {
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    const cx = c.getContext('2d');
    cx.imageSmoothingEnabled = false;
    drawFn(cx, w, h);
    return c;
}

// ---- 玩家精灵 ----
const SPRITE_SCALE = 3;
const SPR_W = 16, SPR_H = 24;

const playerPalette = {
    hair:   '#1a1a2e',
    skin:   '#f0c8a0',
    suit:   '#2c3e6b',
    shirt:  '#ecf0f1',
    tie:    '#c0392b',
    glasses:'#2c3e50',
    shoe:   '#1a1a2e',
    pant:   '#1e2d4a',
};

function drawPlayerBase(cx, w, h, legOffset) {
    // 头发
    cx.fillStyle = playerPalette.hair;
    cx.fillRect(4, 0, 7, 2);
    cx.fillRect(4, 2, 8, 1);

    // 脸
    cx.fillStyle = playerPalette.skin;
    cx.fillRect(4, 2, 7, 6);

    // 眼镜
    cx.fillStyle = playerPalette.glasses;
    cx.fillRect(5, 3, 2, 2);
    cx.fillRect(9, 3, 2, 2);
    cx.fillRect(7, 3, 1, 1);

    // 脖子 + 衣领
    cx.fillStyle = playerPalette.shirt;
    cx.fillRect(4, 8, 7, 1);

    // 西装上身
    cx.fillStyle = playerPalette.suit;
    cx.fillRect(4, 9, 7, 5);

    // 白衬衫
    cx.fillStyle = playerPalette.shirt;
    cx.fillRect(6, 9, 3, 4);

    // 红领带
    cx.fillStyle = playerPalette.tie;
    cx.fillRect(7, 10, 1, 3);

    // 西装下身
    cx.fillStyle = playerPalette.suit;
    cx.fillRect(4, 14, 7, 3);

    // 裤子
    cx.fillStyle = playerPalette.pant;
    cx.fillRect(4, 17, 2, 3 + legOffset);  // 左腿
    cx.fillRect(8, 17, 2, 3 - legOffset);  // 右腿

    // 鞋
    cx.fillStyle = playerPalette.shoe;
    cx.fillRect(3, 20 + legOffset, 3, 2);
    cx.fillRect(7, 20 - legOffset, 3, 2);
}

const playerStand = makeSprite(SPR_W, SPR_H, (cx, w, h) => drawPlayerBase(cx, w, h, 0));
const playerRun1  = makeSprite(SPR_W, SPR_H, (cx, w, h) => drawPlayerBase(cx, w, h, -1));
const playerRun2  = makeSprite(SPR_W, SPR_H, (cx, w, h) => drawPlayerBase(cx, w, h, 1));

// 低头精灵 (12px 高)
const DUCK_W = 16, DUCK_H = 12;
const playerDuck = makeSprite(DUCK_W, DUCK_H, (cx, w, h) => {
    cx.fillStyle = playerPalette.hair;
    cx.fillRect(4, 0, 7, 2);

    cx.fillStyle = playerPalette.skin;
    cx.fillRect(4, 1, 7, 4);

    cx.fillStyle = playerPalette.glasses;
    cx.fillRect(5, 2, 2, 2);
    cx.fillRect(9, 2, 2, 2);
    cx.fillRect(7, 2, 1, 1);

    cx.fillStyle = playerPalette.shirt;
    cx.fillRect(4, 5, 7, 1);

    cx.fillStyle = playerPalette.suit;
    cx.fillRect(4, 6, 7, 4);

    cx.fillStyle = playerPalette.shirt;
    cx.fillRect(6, 6, 3, 3);

    cx.fillStyle = playerPalette.tie;
    cx.fillRect(7, 6, 1, 2);

    cx.fillStyle = playerPalette.pant;
    cx.fillRect(4, 10, 7, 2);

    cx.fillStyle = playerPalette.shoe;
    cx.fillRect(3, 11, 3, 1);
    cx.fillRect(7, 11, 3, 1);
});

// 休息精灵（坐下）
const REST_W = 20, REST_H = 14;
const playerRest = makeSprite(REST_W, REST_H, (cx, w, h) => {
    // 身体躺/坐姿
    cx.fillStyle = playerPalette.skin;
    cx.fillRect(8, 2, 6, 5);   // 脸
    cx.fillStyle = playerPalette.glasses;
    cx.fillRect(9, 3, 2, 2);
    cx.fillRect(13, 3, 2, 2);
    cx.fillRect(11, 3, 1, 1);
    cx.fillStyle = playerPalette.hair;
    cx.fillRect(8, 1, 6, 2);

    cx.fillStyle = playerPalette.suit;
    cx.fillRect(4, 7, 12, 5);  // 身体

    cx.fillStyle = playerPalette.pant;
    cx.fillRect(2, 11, 8, 3);  // 腿伸出
    cx.fillStyle = playerPalette.shoe;
    cx.fillRect(1, 12, 3, 2);
});

// 死亡精灵
const playerDead = makeSprite(SPR_W, SPR_H, (cx, w, h) => {
    drawPlayerBase(cx, w, h, 0);
    // X X 眼
    cx.fillStyle = '#c0392b';
    cx.fillRect(5, 3, 2, 2);
    cx.fillRect(9, 3, 2, 2);
    cx.fillRect(5, 4, 2, 2);
    cx.fillRect(9, 4, 2, 2);
    // 交叉线
    cx.fillStyle = '#c0392b';
    cx.fillRect(6, 3, 1, 1); cx.fillRect(5, 4, 1, 1);
    cx.fillRect(10, 3, 1, 1); cx.fillRect(9, 4, 1, 1);
});

// ---- 道具精灵 ----
// 雪碧 (绿色瓶)
const OBST_W = 12, OBST_H = 18;
const spriteBottle = makeSprite(OBST_W, OBST_H, (cx, w, h) => {
    // 瓶盖
    cx.fillStyle = '#555';
    cx.fillRect(4, 0, 4, 2);
    // 瓶颈
    cx.fillStyle = '#2ecc71';
    cx.fillRect(4, 2, 4, 2);
    cx.fillRect(3, 4, 6, 1);
    // 瓶身
    cx.fillStyle = '#27ae60';
    cx.fillRect(2, 5, 8, 5);
    cx.fillRect(2, 10, 8, 5);
    cx.fillRect(2, 15, 8, 3);
    // 标签
    cx.fillStyle = '#ecf0f1';
    cx.fillRect(3, 7, 6, 4);
    // "雪碧" 简化文字（两个绿点）
    cx.fillStyle = '#27ae60';
    cx.fillRect(4, 8, 2, 2);
    cx.fillRect(7, 8, 2, 2);
});

// 巧乐兹 (巧克力冰淇淋)
const chocoice = makeSprite(OBST_W, OBST_H, (cx, w, h) => {
    // 木棍
    cx.fillStyle = '#d4a574';
    cx.fillRect(5, 13, 2, 5);
    // 巧克力涂层
    cx.fillStyle = '#5D3A1A';
    cx.fillRect(3, 3, 6, 10);
    // 巧克力顶部
    cx.fillStyle = '#3e2310';
    cx.fillRect(2, 2, 8, 3);
    cx.fillRect(3, 5, 6, 1);
    // 奶油层
    cx.fillStyle = '#FFF8DC';
    cx.fillRect(3, 7, 6, 2);
    cx.fillRect(3, 10, 6, 2);
});

// ---- 天空颜色（简单蓝天） ----
const skyGradient = (() => {
    const c = document.createElement('canvas');
    c.width = 1; c.height = GROUND_Y;
    const cx = c.getContext('2d');
    const g = cx.createLinearGradient(0, 0, 0, GROUND_Y);
    g.addColorStop(0, '#87CEEB');
    g.addColorStop(1, '#c8e6f5');
    cx.fillStyle = g;
    cx.fillRect(0, 0, 1, GROUND_Y);
    return c;
})();

// ---- 地面纹理 ----
const groundTex = (() => {
    const c = document.createElement('canvas');
    c.width = 32; c.height = 12;
    const cx = c.getContext('2d');
    cx.fillStyle = '#8B7355';
    cx.fillRect(0, 0, 32, 12);
    // 草地
    cx.fillStyle = '#6B8E23';
    cx.fillRect(0, 0, 32, 3);
    cx.fillStyle = '#556B2F';
    for (let i = 0; i < 32; i += 4) {
        cx.fillRect(i, 0, 2, 2);
    }
    // 土块纹理
    cx.fillStyle = '#7a6548';
    cx.fillRect(2, 5, 10, 2);
    cx.fillRect(18, 6, 8, 2);
    cx.fillRect(10, 9, 12, 1);
    cx.fillRect(26, 4, 4, 2);
    return c;
})();

// ---- 云朵 ----
const cloudSprite = makeSprite(24, 10, (cx, w, h) => {
    cx.fillStyle = '#fff';
    cx.fillRect(4, 4, 8, 4);
    cx.fillRect(8, 2, 10, 4);
    cx.fillRect(16, 4, 6, 3);
    cx.fillRect(2, 5, 4, 3);
});

// ---- 远山 ----
const mountainSprite = makeSprite(60, 40, (cx, w, h) => {
    cx.fillStyle = '#95a5a6';
    cx.beginPath();
    cx.moveTo(0, 40);
    cx.lineTo(10, 15);
    cx.lineTo(25, 30);
    cx.lineTo(35, 10);
    cx.lineTo(50, 25);
    cx.lineTo(60, 40);
    cx.fill();
    cx.fillStyle = '#7f8c8d';
    cx.beginPath();
    cx.moveTo(15, 40);
    cx.lineTo(22, 22);
    cx.lineTo(30, 35);
    cx.lineTo(40, 18);
    cx.lineTo(55, 28);
    cx.lineTo(60, 40);
    cx.fill();
});

// ============================================================
//  游戏状态
// ============================================================
const STATE = { DISCLAIMER: 'disclaimer', START: 'start', PLAYING: 'playing', RESTING: 'resting', GAMEOVER: 'gameover' };

let gameState = STATE.DISCLAIMER;
let score = 0;
let highScore = parseInt(localStorage.getItem('zxf_high') || '0');

let gameSpeed = BASE_SPEED;
let groundOffset = 0;
let bgOffset = 0;

// 玩家
let playerY = GROUND_Y - SPR_H * SPRITE_SCALE;
let playerVY = 0;
let playerJumping = false;
let playerDucking = false;
let animFrame = 0;
let animTimer = 0;

// 危险值
let danger = 0;
let hitFlash = 0;        // 受击闪烁计时

// 休息
let restTimer = 0;
let restCooldownRemain = 0;

// 道具
let obstacles = [];
let obstacleTimer = 0;
let nextObstacleGap = 800;

// 无敌帧（受击后短暂无敌）
let invincibleTimer = 0;

// 云朵
let clouds = Array.from({length: 4}, (_, i) => ({
    x: 100 + i * 220 + Math.random() * 100,
    y: 15 + Math.random() * 60,
    speed: 0.3 + Math.random() * 0.4,
}));

// 山
let mountains = Array.from({length: 6}, (_, i) => ({
    x: i * 180 + Math.random() * 100,
}));

// 粒子
let particles = [];

// 按键状态
let keys = {};
let keyJustPressed = {};  // 本帧刚按下

// ============================================================
//  输入处理
// ============================================================
const prevKeys = {};
window.addEventListener('keydown', e => {
    keys[e.key] = true;
    keys[e.code] = true;
    e.preventDefault();
});
window.addEventListener('keyup', e => {
    keys[e.key] = false;
    keys[e.code] = false;
});

function updateInput() {
    for (const k in keys) {
        if (keys[k] && !prevKeys[k]) keyJustPressed[k] = true;
        else keyJustPressed[k] = false;
    }
    // 克隆当前状态
    for (const k in keys) prevKeys[k] = keys[k];
}

// ---- 移动端触屏按钮 ----
const btnEnter = document.getElementById('btn-enter');
const btnJump = document.getElementById('btn-jump');
const btnDuck = document.getElementById('btn-duck');
const btnRest = document.getElementById('btn-rest');

btnEnter.addEventListener('pointerdown', e => { e.preventDefault(); keys['Enter'] = true; });
btnEnter.addEventListener('pointerup',   e => { e.preventDefault(); keys['Enter'] = false; });
btnEnter.addEventListener('pointerleave', e => { keys['Enter'] = false; });

btnJump.addEventListener('pointerdown', e => { e.preventDefault(); keys[' '] = true; keys['Space'] = true; keys['ArrowUp'] = true; });
btnJump.addEventListener('pointerup',   e => { e.preventDefault(); keys[' '] = false; keys['Space'] = false; keys['ArrowUp'] = false; });
btnJump.addEventListener('pointerleave', e => { keys[' '] = false; keys['Space'] = false; keys['ArrowUp'] = false; });

btnDuck.addEventListener('pointerdown', e => { e.preventDefault(); keys['Shift'] = true; keys['ShiftLeft'] = true; keys['ShiftRight'] = true; });
btnDuck.addEventListener('pointerup',   e => { e.preventDefault(); keys['Shift'] = false; keys['ShiftLeft'] = false; keys['ShiftRight'] = false; });
btnDuck.addEventListener('pointerleave', e => { keys['Shift'] = false; keys['ShiftLeft'] = false; keys['ShiftRight'] = false; });

btnRest.addEventListener('pointerdown', e => { e.preventDefault(); keys['s'] = true; keys['S'] = true; keys['KeyS'] = true; });
btnRest.addEventListener('pointerup',   e => { e.preventDefault(); keys['s'] = false; keys['S'] = false; keys['KeyS'] = false; });
btnRest.addEventListener('pointerleave', e => { keys['s'] = false; keys['S'] = false; keys['KeyS'] = false; });

// ============================================================
//  游戏函数
// ============================================================
function resetGame() {
    score = 0;
    gameSpeed = BASE_SPEED;
    groundOffset = 0;
    bgOffset = 0;
    playerY = GROUND_Y - SPR_H * SPRITE_SCALE;
    playerVY = 0;
    playerJumping = false;
    playerDucking = false;
    animFrame = 0;
    animTimer = 0;
    danger = 0;
    hitFlash = 0;
    restTimer = 0;
    restCooldownRemain = 0;
    obstacles = [];
    obstacleTimer = 0;
    nextObstacleGap = 800;
    invincibleTimer = 0;
    particles = [];
    gameState = STATE.PLAYING;
}

function spawnObstacle() {
    const isTop = Math.random() < 0.45;  // 45% 概率在上方
    const type = Math.random() < 0.5 ? 'sprite' : 'chocoice';
    const sprite = type === 'sprite' ? spriteBottle : chocoice;
    const w = OBST_W * SPRITE_SCALE;
    const h = OBST_H * SPRITE_SCALE;

    let y;
    if (isTop) {
        // 上方：玩家需要低头躲避
        y = GROUND_Y - h - SPR_H * SPRITE_SCALE + 20;
    } else {
        // 下方：玩家需要跳跃躲避
        y = GROUND_Y - h;
    }

    obstacles.push({
        x: W + 20,
        y: y,
        w: w,
        h: h,
        type: type,
        isTop: isTop,
        sprite: sprite,
        hit: false,
    });
}

function startRest() {
    gameState = STATE.RESTING;
    restTimer = REST_DURATION;
    playerJumping = false;
    playerDucking = false;
    playerVY = 0;
    obstacles = [];  // 清除所有道具
}

function endRest() {
    gameState = STATE.PLAYING;
    restCooldownRemain = REST_COOLDOWN;
    restTimer = 0;
    playerY = GROUND_Y - SPR_H * SPRITE_SCALE;
}

function gameOver() {
    gameState = STATE.GAMEOVER;
    if (score > highScore) {
        highScore = score;
        localStorage.setItem('zxf_high', highScore);
    }
    // 死亡粒子
    for (let i = 0; i < 30; i++) {
        particles.push({
            x: PLAYER_X + SPR_W * SPRITE_SCALE / 2,
            y: playerY + SPR_H * SPRITE_SCALE / 2,
            vx: (Math.random() - 0.5) * 8,
            vy: (Math.random() - 0.5) * 8 - 3,
            life: 40 + Math.random() * 30,
            color: Math.random() < 0.5 ? '#c0392b' : '#e74c3c',
        });
    }
}

function addHitParticles(x, y) {
    for (let i = 0; i < 8; i++) {
        particles.push({
            x: x,
            y: y,
            vx: (Math.random() - 0.5) * 4,
            vy: (Math.random() - 0.5) * 4 - 2,
            life: 15 + Math.random() * 15,
            color: '#e74c3c',
        });
    }
}

// ============================================================
//  主循环
// ============================================================
function update(dt) {
    const FPS = 60;
    // dt 大约 16.67ms → 归一化因子
    const norm = dt / (1000 / FPS);

    updateInput();

    if (gameState === STATE.DISCLAIMER) {
        // 按Enter进入开始页
        if (keyJustPressed['Enter']) {
            gameState = STATE.START;
        }
        return;
    }

    if (gameState === STATE.START) {
        // 按空格/Enter开始
        if (keyJustPressed[' '] || keyJustPressed['Space'] || keyJustPressed['ArrowUp'] || keyJustPressed['Enter']) {
            resetGame();
        }
        return;
    }

    if (gameState === STATE.GAMEOVER) {
        // 更新粒子
        for (const p of particles) {
            p.x += p.vx * norm;
            p.y += p.vy * norm;
            p.vy += 0.2 * norm;
            p.life -= norm;
        }
        particles = particles.filter(p => p.life > 0);
        // 按空格/Enter重新开始
        if (keyJustPressed[' '] || keyJustPressed['Space'] || keyJustPressed['ArrowUp'] || keyJustPressed['Enter']) {
            resetGame();
        }
        return;
    }

    // ======== 休息状态 ========
    if (gameState === STATE.RESTING) {
        restTimer -= dt;
        // 危险值衰减
        danger = Math.max(0, danger - DANGER_REST_DECAY * norm);
        // 更新粒子
        for (const p of particles) {
            p.x += p.vx * norm;
            p.y += p.vy * norm;
            p.vy += 0.2 * norm;
            p.life -= norm;
        }
        particles = particles.filter(p => p.life > 0);

        if (restTimer <= 0) {
            endRest();
        }
        return;
    }

    // ======== 正常游戏状态 ========
    // 速度递增
    gameSpeed = Math.min(MAX_SPEED, gameSpeed + SPEED_INC * norm);

    // 更新冷却
    if (restCooldownRemain > 0) {
        restCooldownRemain -= dt;
        if (restCooldownRemain < 0) restCooldownRemain = 0;
    }

    // 更新无敌计时
    if (invincibleTimer > 0) {
        invincibleTimer -= 1000 / FPS * norm;
        if (invincibleTimer < 0) invincibleTimer = 0;
    }

    // 滚动偏移
    groundOffset = (groundOffset + gameSpeed * norm) % 32;
    bgOffset = (bgOffset + gameSpeed * 0.15 * norm) % 1;

    // 分数
    score += gameSpeed * 0.1 * norm;

    // ---- 玩家输入 ----
    // 跳跃 (空格)
    if ((keyJustPressed[' '] || keyJustPressed['Space'] || keyJustPressed['ArrowUp']) && !playerJumping) {
        playerVY = JUMP_FORCE;
        playerJumping = true;
        playerDucking = false;
    }
    // 低头 (Shift)
    if ((keys['Shift'] || keys['ShiftLeft'] || keys['ShiftRight']) && !playerJumping) {
        playerDucking = true;
    } else if (!playerJumping) {
        playerDucking = false;
    }
    // 休息 (S)
    if ((keyJustPressed['s'] || keyJustPressed['S'] || keyJustPressed['KeyS']) && restCooldownRemain <= 0 && !playerJumping) {
        startRest();
        return;
    }

    // ---- 玩家物理 ----
    if (playerJumping) {
        playerVY += GRAVITY * norm;
        playerY += playerVY * norm;
        if (playerY >= GROUND_Y - SPR_H * SPRITE_SCALE) {
            playerY = GROUND_Y - SPR_H * SPRITE_SCALE;
            playerVY = 0;
            playerJumping = false;
        }
    }

    // ---- 动画 ----
    if (!playerJumping) {
        animTimer += norm;
        if (animTimer > 8) {
            animTimer = 0;
            animFrame = (animFrame + 1) % 3;
        }
    }

    // ---- 危险值自然衰减（不碰道具时） ----
    let touchingObstacle = false;
    danger = Math.max(0, danger - DANGER_DECAY * norm);

    // ---- 受击闪烁 ----
    if (hitFlash > 0) hitFlash -= norm;

    // ---- 粒子 ----
    for (const p of particles) {
        p.x += p.vx * norm;
        p.y += p.vy * norm;
        p.vy += 0.15 * norm;
        p.life -= norm;
    }
    particles = particles.filter(p => p.life > 0);

    // ---- 生成道具 ----
    obstacleTimer += norm;
    if (obstacleTimer > nextObstacleGap / gameSpeed) {
        obstacleTimer = 0;
        nextObstacleGap = OBSTACLE_MIN_GAP + Math.random() * (OBSTACLE_MAX_GAP - OBSTACLE_MIN_GAP);
        spawnObstacle();
        // 偶尔同时生成两个
        if (Math.random() < 0.2) {
            setTimeout(() => { if (gameState === STATE.PLAYING) spawnObstacle(); }, 300);
        }
    }

    // ---- 移动道具 & 碰撞检测 ----
    const playerW = SPR_W * SPRITE_SCALE;
    const playerH = playerDucking ? DUCK_H * SPRITE_SCALE : SPR_H * SPRITE_SCALE;
    const playerHitboxY = playerDucking ? GROUND_Y - DUCK_H * SPRITE_SCALE : playerY;
    // 缩小判定框，更宽容
    const marginX = 8, marginY = 4;

    for (const obs of obstacles) {
        obs.x -= gameSpeed * norm;

        if (!obs.hit && invincibleTimer <= 0) {
            if (
                PLAYER_X + marginX < obs.x + obs.w - marginX &&
                PLAYER_X + playerW - marginX > obs.x + marginX &&
                playerHitboxY + marginY < obs.y + obs.h - marginY &&
                playerHitboxY + playerH - marginY > obs.y + marginY
            ) {
                // 碰撞！
                obs.hit = true;
                danger = Math.min(DANGER_MAX, danger + DANGER_ON_HIT);
                hitFlash = 8;
                invincibleTimer = 30;  // 短暂无敌
                addHitParticles(obs.x + obs.w / 2, obs.y + obs.h / 2);

                // 心源性猝死
                if (danger >= DANGER_MAX) {
                    gameOver();
                    return;
                }
            }
        }
    }

    // 移除屏幕外的道具
    obstacles = obstacles.filter(obs => obs.x > -60);

    // ---- 云朵移动 ----
    for (const c of clouds) {
        c.x -= c.speed * norm;
        if (c.x < -30) c.x = W + 30 + Math.random() * 100;
    }

    // ---- 山移动 ----
    for (const m of mountains) {
        m.x -= gameSpeed * 0.15 * norm;
        if (m.x < -70) m.x = W + 70 + Math.random() * 120;
    }
}

function drawPixelSprite(sprite, x, y, w, h, alpha) {
    if (alpha !== undefined) ctx.globalAlpha = alpha;
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(sprite, Math.round(x), Math.round(y), Math.round(w), Math.round(h));
    if (alpha !== undefined) ctx.globalAlpha = 1;
}

function render() {
    ctx.clearRect(0, 0, W, H);

    // ---- 天空 ----
    ctx.drawImage(skyGradient, 0, 0, W, GROUND_Y);

    // ---- 远山 ----
    for (const m of mountains) {
        ctx.imageSmoothingEnabled = false;
        ctx.globalAlpha = 0.5;
        ctx.drawImage(mountainSprite, Math.round(m.x), GROUND_Y - 42, 60, 42);
        ctx.globalAlpha = 1;
    }

    // ---- 云朵 ----
    for (const c of clouds) {
        ctx.globalAlpha = 0.7;
        drawPixelSprite(cloudSprite, c.x, c.y, 48, 20);
        ctx.globalAlpha = 1;
    }

    // ---- 地面 ----
    for (let x = -groundOffset; x < W + 32; x += 32) {
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(groundTex, Math.round(x), GROUND_Y, 32, 12);
    }

    // 地面线下方填充
    ctx.fillStyle = '#6B5B3D';
    ctx.fillRect(0, GROUND_Y + 12, W, H - GROUND_Y - 12);

    // ---- 道具 ----
    for (const obs of obstacles) {
        if (obs.hit) continue;  // 已碰撞的不再显示
        const sw = obs.w, sh = obs.h;
        drawPixelSprite(obs.sprite, obs.x, obs.y, sw, sh);
    }

    // ---- 玩家 ----
    if (gameState === STATE.GAMEOVER) {
        // 死亡精灵
        drawPixelSprite(playerDead, PLAYER_X, playerY, SPR_W * SPRITE_SCALE, SPR_H * SPRITE_SCALE);
    } else if (gameState === STATE.RESTING) {
        // 休息精灵
        const rx = PLAYER_X - 10;
        const ry = GROUND_Y - REST_H * SPRITE_SCALE;
        drawPixelSprite(playerRest, rx, ry, REST_W * SPRITE_SCALE, REST_H * SPRITE_SCALE);
    } else {
        const pw = SPR_W * SPRITE_SCALE;
        let ph, sprite, drawY;

        if (playerDucking) {
            ph = DUCK_H * SPRITE_SCALE;
            sprite = playerDuck;
            drawY = GROUND_Y - ph;
        } else {
            ph = SPR_H * SPRITE_SCALE;
            const frames = [playerStand, playerRun1, playerRun2];
            sprite = frames[animFrame];
            drawY = playerY;
        }

        // 红色闪烁警告
        const shouldFlash = danger >= DANGER_WARN && Math.sin(Date.now() * 0.015) > 0.3;

        drawPixelSprite(sprite, PLAYER_X, drawY, pw, ph);

        if (shouldFlash) {
            // 红色叠加
            ctx.globalCompositeOperation = 'source-atop';
            ctx.fillStyle = 'rgba(255, 0, 0, 0.45)';
            ctx.fillRect(Math.round(PLAYER_X), Math.round(drawY), Math.round(pw), Math.round(ph));
            ctx.globalCompositeOperation = 'source-over';
        }

        // 受击闪烁
        if (hitFlash > 0 && Math.floor(hitFlash) % 2 === 0) {
            ctx.globalAlpha = 0.5;
            ctx.fillStyle = '#fff';
            ctx.fillRect(Math.round(PLAYER_X) - 2, Math.round(drawY) - 2, Math.round(pw) + 4, Math.round(ph) + 4);
            ctx.globalAlpha = 1;
        }
    }

    // ---- 粒子 ----
    for (const p of particles) {
        ctx.globalAlpha = p.life / 40;
        ctx.fillStyle = p.color;
        ctx.fillRect(Math.round(p.x), Math.round(p.y), 2, 2);
    }
    ctx.globalAlpha = 1;

    // ======== UI ========
    // 危险值背景
    const barX = 12, barY = 10, barW = 200, barH = 14;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(barX - 1, barY - 1, barW + 2, barH + 2);
    ctx.fillStyle = '#333';
    ctx.fillRect(barX, barY, barW, barH);

    // 危险值填充（渐变：绿→黄→红）
    const dangerPct = danger / DANGER_MAX;
    if (dangerPct > 0) {
        let barColor;
        if (dangerPct < 0.5) {
            barColor = `rgb(${Math.floor(46 * dangerPct * 2)}, ${Math.floor(204 - 60 * dangerPct * 2)}, ${Math.floor(113 - 30 * dangerPct * 2)})`;
        } else if (dangerPct < 0.75) {
            const t = (dangerPct - 0.5) * 4;
            barColor = `rgb(${Math.floor(46 + 209 * t)}, ${Math.floor(144 - 44 * t)}, ${Math.floor(83 - 83 * t)})`;
        } else {
            const t = (dangerPct - 0.75) * 4;
            barColor = '#e74c3c';
        }
        ctx.fillStyle = barColor;
        ctx.fillRect(barX, barY, barW * dangerPct, barH);
    }

    // 危险值边框
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 1;
    ctx.strokeRect(barX, barY, barW, barH);

    // 危险值文字
    ctx.fillStyle = '#fff';
    ctx.font = fontCN(10, true);
    ctx.textAlign = 'left';
    ctx.fillText('危险值', barX + 2, barY + 11);

    // 警告文字
    if (danger >= DANGER_WARN) {
        const warnAlpha = 0.5 + 0.5 * Math.sin(Date.now() * 0.01);
        ctx.fillStyle = `rgba(255, 50, 50, ${warnAlpha})`;
        ctx.font = fontCN(11, true);
        ctx.textAlign = 'left';
        ctx.fillText('⚠ 警告！', barX + barW + 8, barY + 11);
    }

    // 休息冷却指示
    const cdX = 12, cdY = 30;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(cdX - 1, cdY - 1, 130, 12);
    ctx.fillStyle = '#444';
    ctx.fillRect(cdX, cdY, 130, 10);
    if (restCooldownRemain > 0) {
        const cdPct = 1 - restCooldownRemain / REST_COOLDOWN;
        ctx.fillStyle = '#3498db';
        ctx.fillRect(cdX, cdY, 130 * cdPct, 10);
    } else {
        ctx.fillStyle = '#2ecc71';
        ctx.fillRect(cdX, cdY, 130, 10);
    }
    ctx.fillStyle = '#fff';
    ctx.font = fontCN(9, false);
    ctx.textAlign = 'left';
    ctx.fillText(restCooldownRemain > 0 ? `休息冷却 ${Math.ceil(restCooldownRemain / 1000)}s` : '休息就绪 [S]', cdX + 2, cdY + 9);

    // 休息进度（如果在休息中）
    if (gameState === STATE.RESTING) {
        const restProgress = 1 - restTimer / REST_DURATION;
        const restBarW = 180;
        const restX = W / 2 - restBarW / 2, restY = H / 2 + 40;
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(restX - 2, restY - 2, restBarW + 4, 18);
        ctx.fillStyle = '#2c3e50';
        ctx.fillRect(restX, restY, restBarW, 14);
        ctx.fillStyle = '#f39c12';
        ctx.fillRect(restX, restY, restBarW * restProgress, 14);
        ctx.fillStyle = '#fff';
        ctx.font = fontCN(11, true);
        ctx.textAlign = 'center';
        ctx.fillText(`休息中... ${Math.ceil(restTimer / 1000)}s`, W / 2, restY + 11);
    }

    // 分数
    ctx.fillStyle = '#333';
    ctx.font = fontCN(13, true);
    ctx.textAlign = 'right';
    ctx.fillText(`距离: ${Math.floor(score)}m`, W - 14, barY + 11);

    // 操作提示
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = fontCN(9, false);
    ctx.textAlign = 'right';
    ctx.fillText('[空格]跳跃 [Shift]低头 [S]休息', W - 14, cdY + 9);

    // 最高分
    if (highScore > 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.font = fontCN(10, false);
        ctx.textAlign = 'right';
        ctx.fillText(`最高: ${Math.floor(highScore)}m`, W - 14, cdY + 22);
    }

    // ---- 声明页面 ----
    if (gameState === STATE.DISCLAIMER) {
        ctx.fillStyle = 'rgba(0,0,0,0.85)';
        ctx.fillRect(0, 0, W, H);

        // 标题
        ctx.fillStyle = '#f1c40f';
        ctx.font = fontCN(18, true);
        ctx.textAlign = 'center';
        ctx.fillText('张雪峰模拟器', W / 2, 32);

        // 尊重逝者
        ctx.fillStyle = '#ecf0f1';
        ctx.font = fontCN(12, true);
        ctx.fillText('适度玩梗，尊重逝者，逝者安息。', W / 2, 56);

        // 分隔线
        ctx.strokeStyle = '#555';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(140, 66);
        ctx.lineTo(W - 140, 66);
        ctx.stroke();

        // 科普标题
        ctx.fillStyle = '#e74c3c';
        ctx.font = fontCN(11, true);
        ctx.fillText('▎关于心源性猝死', W / 2, 82);

        // 科普内容
        ctx.fillStyle = '#bdc3c7';
        ctx.font = fontCN(10, false);
        ctx.textAlign = 'left';
        const infoX = 120;
        const lines = [
            '◆ 心源性猝死是指由心脏原因导致的突然、意外死亡，',
            '   通常在症状出现后1小时内发生。',
            '',
            '◆ 常见预警症状：',
            '   胸痛胸闷 · 心悸心慌 · 呼吸困难 · 头晕乏力 · 眼前发黑',
            '',
            '◆ 主要诱因：',
            '   过度劳累 · 剧烈运动 · 情绪激动 · 大量烟酒 · 长期熬夜',
            '',
            '◆ 高危人群：',
            '   冠心病/心肌病患者 · 有猝死家族史者 · 三高人群',
            '',
            '◆ 预防措施：',
            '   定期体检  ·  控制三高  ·  戒烟限酒',
            '   避免过度劳累  ·  规律作息  ·  学习CPR',
        ];
        let lineY = 98;
        for (const line of lines) {
            if (line === '') { lineY += 8; continue; }
            ctx.fillText(line, infoX, lineY);
            lineY += 13;
        }

        // 底部提示 - 居中闪烁
        ctx.textAlign = 'center';
        const blink = Math.sin(Date.now() * 0.005) > 0;
        if (blink) {
            ctx.fillStyle = '#fff';
            ctx.font = fontCN(13, true);
            ctx.fillText('按 Enter 进入游戏', W / 2, H - 16);
        }
    }

    // ---- 开始画面 ----
    if (gameState === STATE.START) {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, W, H);

        // 标题
        ctx.fillStyle = '#f1c40f';
        ctx.font = fontCN(28, true);
        ctx.textAlign = 'center';
        ctx.fillText('张雪峰模拟器', W / 2, H / 2 - 50);

        // 副标题
        ctx.fillStyle = '#ecf0f1';
        ctx.font = fontCN(13, false);
        ctx.fillText('像素风跑酷小游戏', W / 2, H / 2 - 22);

        // 玩家展示
        drawPixelSprite(playerStand, W / 2 - SPR_W * SPRITE_SCALE / 2, H / 2 - 10, SPR_W * SPRITE_SCALE, SPR_H * SPRITE_SCALE);

        // 道具展示
        drawPixelSprite(spriteBottle, W / 2 - 90, GROUND_Y - OBST_H * SPRITE_SCALE, OBST_W * SPRITE_SCALE, OBST_H * SPRITE_SCALE);
        drawPixelSprite(chocoice, W / 2 + 60, GROUND_Y - OBST_H * SPRITE_SCALE, OBST_W * SPRITE_SCALE, OBST_H * SPRITE_SCALE);

        // 道具标签
        ctx.fillStyle = '#2ecc71';
        ctx.font = fontCN(10, true);
        ctx.fillText('雪碧', W / 2 - 90 + OBST_W * SPRITE_SCALE / 2, GROUND_Y + 16);
        ctx.fillStyle = '#d4a574';
        ctx.fillText('巧乐兹', W / 2 + 60 + OBST_W * SPRITE_SCALE / 2, GROUND_Y + 16);

        // 操作说明
        ctx.fillStyle = '#bdc3c7';
        ctx.font = fontCN(11, false);
        const instY = H / 2 + 55;
        ctx.fillText('[空格] 跳跃躲避  |  [Shift] 低头躲避  |  [S] 休息恢复', W / 2, instY);

        // 开始提示（闪烁）
        const blink = Math.sin(Date.now() * 0.005) > 0;
        if (blink) {
            ctx.fillStyle = '#fff';
            ctx.font = fontCN(16, true);
            ctx.fillText('按空格或Enter开始游戏', W / 2, instY + 35);
        }
    }

    // ---- 游戏结束画面 ----
    if (gameState === STATE.GAMEOVER) {
        ctx.fillStyle = 'rgba(0,0,0,0.65)';
        ctx.fillRect(0, 0, W, H);

        // 红色闪烁
        const deadFlash = Math.sin(Date.now() * 0.02) > 0;
        if (deadFlash) {
            ctx.fillStyle = 'rgba(200, 0, 0, 0.25)';
            ctx.fillRect(0, 0, W, H);
        }

        ctx.fillStyle = '#e74c3c';
        ctx.font = fontCN(24, true);
        ctx.textAlign = 'center';
        ctx.fillText('心源性猝死！', W / 2, H / 2 - 35);

        ctx.fillStyle = '#ecf0f1';
        ctx.font = fontCN(14, false);
        ctx.fillText(`奔跑距离: ${Math.floor(score)}m`, W / 2, H / 2 + 5);

        if (score >= highScore && score > 0) {
            ctx.fillStyle = '#f1c40f';
            ctx.font = fontCN(13, true);
            ctx.fillText('🏆 新纪录！', W / 2, H / 2 + 25);
        } else {
            ctx.fillStyle = '#95a5a6';
            ctx.font = fontCN(12, false);
            ctx.fillText(`最高记录: ${Math.floor(highScore)}m`, W / 2, H / 2 + 25);
        }

        const blink2 = Math.sin(Date.now() * 0.005) > 0;
        if (blink2) {
            ctx.fillStyle = '#fff';
            ctx.font = fontCN(14, true);
            ctx.fillText('按空格或Enter重新开始', W / 2, H / 2 + 55);
        }
    }
}

// ============================================================
//  游戏循环
// ============================================================
let lastTime = performance.now();

function gameLoop(timestamp) {
    const dt = Math.min(timestamp - lastTime, 50); // 防止大帧跳跃
    lastTime = timestamp;

    update(dt);
    render();

    requestAnimationFrame(gameLoop);
}

// ============================================================
//  启动
// ============================================================
// 初始显示开始画面
groundOffset = 0;
bgOffset = 0;
requestAnimationFrame(gameLoop);

console.log('🎓 张雪峰模拟器已就绪！');
console.log('  [空格] 跳跃  |  [Shift] 低头  |  [S] 休息');
console.log('  躲避雪碧和巧乐兹，保持危险值不超标！');
</script>
